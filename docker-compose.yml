# SwingAI — local infra. Its OWN Postgres + Redis instances (separate container
# names, volumes, and host ports) so they never clash with OmniMark's stack.
#   DB    : localhost:5434  (OmniMark uses 5433)
#   Redis : localhost:6380  (OmniMark uses 6379)
services:
  db:
    image: postgres:16-alpine
    container_name: swingai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swingai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swingai}
      POSTGRES_DB: ${POSTGRES_DB:-swingaidb}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - swingai_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swingai} -d ${POSTGRES_DB:-swingaidb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: swingai_redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - swingai_redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swingai_pgdata:
  swingai_redisdata:
