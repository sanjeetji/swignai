# Render blueprint (https://render.com/docs/blueprint-spec) — one-click backend infra.
# Frontends deploy on Vercel (see DEPLOY.md). Fill the marked secrets in the Render dashboard.
services:
  # FastAPI API
  - type: web
    name: swingai-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: swingai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: swingai-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_VAULT_KEY
        generateValue: true
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: DATA_PROVIDER
        value: angelone
      - key: CORS_ORIGINS
        sync: false            # set to your Vercel URLs, comma-separated
      # secrets — set in the dashboard (sync:false keeps them out of git)
      - key: ANGELONE_API_KEY
        sync: false
      - key: ANGELONE_CLIENT_CODE
        sync: false
      - key: ANGELONE_MPIN
        sync: false
      - key: ANGELONE_TOTP_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: redis
    name: swingai-redis
    ipAllowList: []
    plan: free

databases:
  - name: swingai-db
    plan: free
